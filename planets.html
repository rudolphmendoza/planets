<!doctype html>
<html>
  <head>
    <title>Planet Facts</title>
    <!-- Added styles to center and enlarge text -->
    <!-- Added background image and adjusted text color for outer space theme -->
    <style>
      body {
        text-align: center;
        font-size: 1.5em;
        background: url("outerspace.jpg") no-repeat center center fixed;
        background-size: cover;
        color: #f0f0f0; /* Light gray for better contrast on space background */
        margin: 0;
        padding: 20px;
      }
      button {
        margin: 5px;
        font-size: 1em;
        background: rgba(
          51,
          51,
          51,
          0.8
        ); /* Semi-transparent dark background */
        color: white;
        border: 1px solid #666;
        padding: 10px 20px;
        border-radius: 5px;
      }
      button:hover {
        background: rgba(85, 85, 85, 0.8);
      }
      img {
        margin-top: 20px;
        border-radius: 10px;
        border: 3px solid white;
      }
    </style>
  </head>
  <body>
    <h1>🌍 Planet Facts</h1>

    <button onclick="showFact('mercury')">Mercury</button>
    <button onclick="showFact('venus')">Venus</button>
    <button onclick="showFact('earth')">Earth</button>
    <button onclick="showFact('mars')">Mars</button>
    <button onclick="showFact('jupiter')">Jupiter</button>
    <!-- Added Saturn button -->
    <button onclick="showFact('saturn')">Saturn</button>
    <!-- Added Uranus button -->
    <button onclick="showFact('uranus')">Uranus</button>
    <!-- Added Neptune button -->
    <button onclick="showFact('neptune')">Neptune</button>

    <p id="fact"></p>

    <img id="planetImage" src="" alt="Planet Image" width="400" />

    <script>
      function showFact(planet) {
        let facts = {
          mercury: "Mercury is the closest planet to the Sun.",
          venus: "Venus is the hottest planet.",
          earth: "Earth is our home planet.",
          mars: "Mars is known as the red planet.",
          jupiter: "Jupiter is the largest planet.",
          saturn: "Saturn is famous for its beautiful rings.",
          uranus:
            "Uranus is the seventh planet from the Sun and rotates on its side.",
          neptune: "Neptune is the eighth and farthest planet from the Sun.",
        };

        let images = {
          mercury: "mercury.jpg",
          venus: "venus.jpg",
          earth: "earth.jpg",
          mars: "mars.jpg",
          jupiter: "jupiter.jpg",
          saturn: "saturn.jpg",
          uranus: "uranus.jpg",
          neptune: "neptune.jpg",
        };

        document.getElementById("fact").innerText = facts[planet];
        document.getElementById("planetImage").src = images[planet];
      }
    </script>
  </body>
</html>
